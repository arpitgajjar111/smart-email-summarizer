<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InkBrief</title>
  <style>
    :root {
      --bg: #0f0f11;
      --surface: #17171b;
      --surface-2: #1e1e24;
      --border: #2a2a33;
      --text: #e8e8ef;
      --text-2: #9090a0;
      --text-3: #55556a;
      --accent: #6b7bff;
      --accent-glow: rgba(107,123,255,.18);
      --success: #4ade80;
      --danger: #ff5c5c;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 380px;
      min-height: 200px;
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
      line-height: 1.5;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border);
    }
    .logo-mark { color: var(--accent); font-size: 16px; }
    .logo-text  { font-size: 1rem; font-weight: 500; letter-spacing: -0.02em; }
    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--success);
      margin-left: auto;
    }
    .status-dot.offline { background: var(--danger); }

    /* Controls */
    .controls {
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .row {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--text-3);
      min-width: 48px;
      font-family: monospace;
    }
    select {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 0.8rem;
      padding: 5px 8px;
      border-radius: 6px;
      outline: none;
    }

    /* Buttons */
    .btn-primary {
      width: 100%;
      padding: 10px;
      background: var(--accent);
      border: none;
      color: #fff;
      font-size: 0.82rem;
      font-weight: 600;
      border-radius: 7px;
      cursor: pointer;
      letter-spacing: .02em;
      transition: opacity .15s;
    }
    .btn-primary:hover { opacity: .88; }
    .btn-primary:disabled { opacity: .45; cursor: not-allowed; }

    /* Result */
    .result {
      border-top: 1px solid var(--border);
      padding: 12px 16px;
      display: none;
    }
    .result-meta {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
      font-family: monospace;
      font-size: 0.68rem;
      color: var(--text-3);
    }
    .meta-pill {
      background: var(--accent-glow);
      color: var(--accent);
      padding: 1px 7px;
      border-radius: 99px;
    }
    .result-text {
      font-size: 0.82rem;
      line-height: 1.7;
      color: var(--text);
      max-height: 220px;
      overflow-y: auto;
      padding-right: 4px;
    }
    .result-actions {
      display: flex;
      gap: 6px;
      margin-top: 10px;
    }
    .btn-small {
      flex: 1;
      padding: 6px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text-2);
      font-size: 0.75rem;
      border-radius: 6px;
      cursor: pointer;
      transition: all .15s;
    }
    .btn-small:hover { color: var(--text); border-color: var(--accent); }

    /* Status message */
    .status-msg {
      padding: 10px 16px;
      font-size: 0.78rem;
      color: var(--text-2);
      display: none;
      align-items: center;
      gap: 8px;
      border-top: 1px solid var(--border);
    }
    .spinner {
      width: 14px; height: 14px;
      border: 1.5px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Error */
    .error-msg {
      padding: 10px 16px;
      background: rgba(255,92,92,.08);
      color: var(--danger);
      font-size: 0.78rem;
      border-top: 1px solid rgba(255,92,92,.2);
      display: none;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>

<div class="header">
  <span class="logo-mark">◈</span>
  <span class="logo-text">InkBrief</span>
  <div class="status-dot" id="statusDot" title="Backend connection status"></div>
</div>

<div class="controls">
  <div class="row">
    <label>Model</label>
    <select id="modelSel">
      <option value="facebook/bart-large-cnn">BART (recommended)</option>
      <option value="google/pegasus-xsum">PEGASUS (concise)</option>
      <option value="t5-base">T5 (general)</option>
    </select>
  </div>
  <div class="row">
    <label>Length</label>
    <select id="lengthSel">
      <option value="short">Short</option>
      <option value="medium" selected>Medium</option>
      <option value="detailed">Detailed</option>
    </select>
  </div>
  <button class="btn-primary" id="summarizeBtn">
    Summarize Email
  </button>
</div>

<div class="status-msg" id="statusMsg">
  <div class="spinner"></div>
  <span id="statusText">Loading model…</span>
</div>

<div class="error-msg" id="errorMsg"></div>

<div class="result" id="result">
  <div class="result-meta">
    <span class="meta-pill" id="modelBadge">BART</span>
    <span id="reductionStat">—</span>
    <span id="timeStat">—</span>
  </div>
  <div class="result-text" id="resultText"></div>
  <div class="result-actions">
    <button class="btn-small" id="copyBtn">Copy</button>
    <button class="btn-small" id="openAppBtn">Open App</button>
  </div>
</div>

<script src="popup.js"></script>
</body>
</html>
